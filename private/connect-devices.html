<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect devices</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard">

    <div class="header-tab">
        <h1>Connect devices</h1>
        <div class="header-actions">
            <a href="/dashboard" class="log-activity-btn connect-devices-header-link">Back to dashboard</a>
            <div class="logout" id="connectDevicesLogout">
                Log out
            </div>
        </div>
    </div>

    <main class="dashboard-main connect-devices-main">
        <section class="connect-devices-content" aria-labelledby="pageHeading">
            <h2 id="pageHeading" class="section-title">Wearables &amp; apps</h2>
            <p class="section-hint">Garmin does not offer a public activity API for third-party apps. We plan to sync via GarminDB on the server (secure credentials and scheduled jobs)—not from your browser.</p>
            <div class="connect-devices-actions">
                <button type="button" class="log-activity-btn" id="connectGarminBtn">Connect Garmin</button>
            </div>
            <p class="connect-devices-status" id="garminStatus" role="status" aria-live="polite"></p>
        </section>
    </main>

    <script src="/js/connect-devices.js"></script>

</body>
</html>
